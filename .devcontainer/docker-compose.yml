services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet@sha256:7dce5de0e82a1d7bf31b1ab8eface12e450648ea990d00ca69b77e898cb8a2d9
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      sql:
        condition: service_healthy
      azurite:
        condition: service_started
      appconfig:
        condition: service_started
      aspire-dashboard:
        condition: service_started
    environment:
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/workspace/.devcontainer/https/devcontainer-https.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${DEVCONTAINER_CERT_PASSWORD:-devcontainer-local-password}
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__umbracoDbDSN=Server=sql,1433;Database=UmbracoDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__AzureStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - ConnectionStrings__AppConfig=Endpoint=http://appconfig:8483;Id=;Secret=
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    env_file:
      - ../.env
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard@sha256:6bd14400bf477e71b7ac7c17bc7d550281aa33a8dac6654acbb72dbf223d166b
    ports:
      - "127.0.0.1:18888:18888"
      - "127.0.0.1:18889:18889"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  sql:
    image: mcr.microsoft.com/mssql/server@sha256:d38c2a64812d775f844088e4e44ab33846eefc61157431bf9c8a3943a534c22e
    environment:
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    command:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        sql_pid=$$!

        until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -No -Q "SELECT 1" > /dev/null 2>&1; do
          sleep 2
        done

        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -No -Q "IF DB_ID(N'UmbracoDb') IS NULL CREATE DATABASE [UmbracoDb];"

        wait "$$sql_pid"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 5s
    networks:
      - devcontainer
  
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite@sha256:dae2a5f96553962901304b94e72ef87e299d0825e4b679673bcc527a25076fe4
    ports:
      - "127.0.0.1:10000:10000"
      - "127.0.0.1:10001:10001"
      - "127.0.0.1:10002:10002"
    volumes:
      - azurite-data:/data
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  appconfig:
    image: mcr.microsoft.com/azure-app-configuration/app-configuration-emulator@sha256:9451b6523b2033df43126a3e9de49b4acf362f48f5fe8dcfa9750d9a9c459304
    ports:
      - "127.0.0.1:8483:8483"
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

volumes:
  mssql-data:
  azurite-data:

networks:
  devcontainer:
    driver: bridge
