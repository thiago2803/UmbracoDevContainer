version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      sql:
        condition: service_healthy
      azurite:
        condition: service_started
      appconfig:
        condition: service_started
      aspire-dashboard:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__umbracoDbDSN=Server=sql,1433;Database=UmbracoDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__AzureStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - ConnectionStrings__AppConfig=Endpoint=http://appconfig:8080;Id=;Secret=
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    env_file:
      - ../.env
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    command:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        sql_pid=$$!

        until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SQL_SA_PASSWORD" -No -Q "SELECT 1" > /dev/null 2>&1; do
          sleep 2
        done

        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SQL_SA_PASSWORD" -No -Q "IF DB_ID(N'UmbracoDb') IS NULL CREATE DATABASE [UmbracoDb];"

        wait "$$sql_pid"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 5s
    networks:
      - devcontainer
  
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

  appconfig:
    image: mcr.microsoft.com/azure-app-configuration/app-configuration-emulator:1.0.2
    ports:
      - "8080:8080"
    networks:
      - devcontainer
    profiles:
      - umbraco-devcontainer

volumes:
  mssql-data:
  azurite-data:

networks:
  devcontainer:
    driver: bridge
